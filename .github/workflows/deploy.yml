name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: asset-pilot-ai
  APP_NAME: app-asset-pilot-ai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: assetpilotacr2026.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t assetpilotacr2026.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push assetpilotacr2026.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: assetpilotacr2026.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
